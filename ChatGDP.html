
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatGDP · 4 Lights</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #1a1a18;
      padding: 1.5rem 1.75rem 2.5rem;
      max-width: 860px;
      margin: 0 auto;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 3px;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 1.25rem;
      line-height: 1.4;
    }

    .stat-row {
      display: flex;
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .stat-card {
      background: #f0ede4;
      border-radius: 6px;
      padding: 10px 14px 12px;
      min-width: 160px;
    }

    .stat-card.range { background: #fdf5d8; }

    .stat-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 3px;
    }

    .stat-value {
      font-size: 26px;
      font-weight: 600;
      color: #1a1a18;
      line-height: 1.1;
    }

    .stat-card.range .stat-value { font-size: 20px; padding-top: 4px; }

    .stat-sub {
      font-size: 11px;
      color: #999;
      margin-top: 3px;
    }

    .chart-wrap { position: relative; width: 100%; height: 340px; }

    .chart-footer { font-size: 11px; color: #bbb; margin-top: 10px; }
    .chart-footer a { color: #bbb; }
    .msg { font-size: 14px; color: #999; padding: 2rem 0; text-align: center; }
  </style>
</head>
<body>

  <h1>ChatGDP</h1>
  <p class="subtitle">AI (Gemini) powered daily estimate of current-quarter U.S. real GDP growth</p>

  <div class="stat-row">
    <div class="stat-card">
      <div class="stat-label">latest nowcast</div>
      <div class="stat-value" id="stat-latest">—</div>
      <div class="stat-sub">3-day moving average</div>
    </div>
    <div class="stat-card range">
      <div class="stat-label">forecast range</div>
      <div class="stat-value" id="stat-range">—</div>
      <div class="stat-sub" id="stat-date">&nbsp;</div>
    </div>
  </div>

  <div class="chart-wrap">
    <canvas id="gdpChart" role="img" aria-label="ChatGDP 3-day moving average nowcast with forecast range band">Loading...</canvas>
  </div>

  <p class="chart-footer">
    Source: <a href="https://www.4lightsdata.com/economic-analysis/chatgdp">4lightsdata.com</a>
    &middot; Powered by Gemini &middot; Refreshes on page load
  </p>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script>
    const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTqfjItKlgvLf8yz1CW0ei0Z1X6_ykavTHw7NVXus_nz8uKIS8E_6qxrnHKXSMoD4ZMHiEyxt3IjowW/pub?gid=350089888&single=true&output=csv';

    function parseVal(s) {
      if (!s) return null;
      const v = parseFloat(s.replace(/[+%\s]/g, ''));
      return isNaN(v) ? null : v;
    }

    function fmtDate(s) {
      if (!s) return s;
      const p = s.trim().split('-');
      if (p.length !== 3) return s;
      const m = parseInt(p[0], 10), d = parseInt(p[1], 10), y = p[2].trim();
      if (isNaN(m) || isNaN(d)) return s;
      return m + '/' + d + '/' + y;
    }

    function fmtVal(v) {
      if (v === null) return '—';
      return (v >= 0 ? '+' : '') + v.toFixed(1) + '%';
    }

    function parseCSVLine(line) {
      const result = []; let cur = '', inQ = false;
      for (const ch of line) {
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      result.push(cur.trim());
      return result;
    }

    async function init() {
      const canvas = document.getElementById('gdpChart');
      try {
        const res = await fetch(CSV);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        const lines = text.trim().split('\n').filter(l => l.trim());
        const rows = lines.slice(1).map(l => {
          const c = parseCSVLine(l);
          return { quarter: c[0], date: c[1], gdp: parseVal(c[2]), low: parseVal(c[3]), high: parseVal(c[4]) };
        }).filter(r => r.date && r.gdp !== null);

        if (!rows.length) throw new Error('No data');

        const last = rows[rows.length - 1];
        document.getElementById('stat-latest').textContent = fmtVal(last.gdp);
        document.getElementById('stat-range').textContent  = fmtVal(last.low) + ' to ' + fmtVal(last.high);
        document.getElementById('stat-date').textContent   = 'as of ' + fmtDate(last.date);

        const labels   = rows.map(r => fmtDate(r.date));
        const gdpVals  = rows.map(r => r.gdp);
        const lowVals  = rows.map(r => r.low);
        const highVals = rows.map(r => r.high);

        const quarterChanges = [];
        let prevQ = null;
        rows.forEach((r, i) => { if (r.quarter !== prevQ && prevQ !== null) quarterChanges.push(i); prevQ = r.quarter; });

        new Chart(canvas, {
          type: 'line',
          data: {
            labels,
            datasets: [
              { label: 'High', data: highVals, borderColor: 'transparent', backgroundColor: 'rgba(240,210,100,0.35)', fill: '+1', pointRadius: 0, tension: 0.3, order: 3 },
              { label: 'Low',  data: lowVals,  borderColor: 'transparent', backgroundColor: 'transparent', fill: false, pointRadius: 0, tension: 0.3, order: 3 },
              { label: 'Nowcast', data: gdpVals, borderColor: '#1a1a18', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 0, pointHoverRadius: 4, pointHoverBackgroundColor: '#1a1a18', pointHoverBorderColor: '#fff', pointHoverBorderWidth: 2, tension: 0.3, order: 1 }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            layout: { padding: { top: 10 } },
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#fff',
                borderColor: 'rgba(0,0,0,0.1)',
                borderWidth: 1,
                titleColor: '#333',
                bodyColor: '#555',
                padding: 10,
                callbacks: {
                  title: items => fmtDate(rows[items[0].dataIndex].date) + '  ·  ' + rows[items[0].dataIndex].quarter,
                  label: ctx => {
                    if (ctx.dataset.label === 'Nowcast') return '  Nowcast: ' + fmtVal(ctx.parsed.y);
                    if (ctx.dataset.label === 'High')    return '  Range: ' + fmtVal(lowVals[ctx.dataIndex]) + ' to ' + fmtVal(ctx.parsed.y);
                    return null;
                  },
                  filter: ctx => ctx.dataset.label !== 'Low'
                }
              }
            },
            scales: {
              x: {
                grid:   { display: false },
                border: { color: '#ccc', width: 1 },
                ticks:  { color: '#666', font: { size: 11 }, maxTicksLimit: 8, maxRotation: 0 }
              },
              y: {
                position: 'right',
                grid:     { color: 'rgba(0,0,0,0.05)' },
                border:   { display: false },
                ticks:    { color: '#666', font: { size: 11 }, callback: v => (v >= 0 ? '+' : '') + v.toFixed(1) + '%' }
              }
            }
          },
          plugins: [
            {
              id: 'zeroLine',
              afterDraw(chart) {
                const { ctx, scales: { x, y } } = chart;
                const yPos = y.getPixelForValue(0);
                if (yPos < y.top || yPos > y.bottom) return;
                ctx.save();
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 1;
                ctx.moveTo(x.left, yPos);
                ctx.lineTo(x.right, yPos);
                ctx.stroke();
                ctx.restore();
              }
            },
            {
              id: 'quarterDividers',
              afterDraw(chart) {
                const { ctx, scales: { x, y } } = chart;
                quarterChanges.forEach(idx => {
                  const xPos = x.getPixelForValue(idx);
                  ctx.save();
                  ctx.beginPath();
                  ctx.setLineDash([2, 4]);
                  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
                  ctx.lineWidth = 1;
                  ctx.moveTo(xPos, y.top);
                  ctx.lineTo(xPos, y.bottom);
                  ctx.stroke();
                  ctx.restore();
                });
              }
            }
          ]
        });

      } catch(e) {
        canvas.outerHTML = '<p class="msg">Could not load data — <a href="' + CSV + '">view source</a><br><small>' + e.message + '</small></p>';
      }
    }

    init();
  </script>
</body>
</html>
